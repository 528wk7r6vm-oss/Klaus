<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitman Master - Levels</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mode.css">
    <link rel="stylesheet" href="level.css">
    <link rel="stylesheet" href="shared.css">
    <script src="app.js" defer></script>
</head>
<body data-page="level">

    <div class="menu-card level-page">
        <header class="top-nav">
            <div class="nav-right">
                <button class="hidden-settings" type="button" title="Settings" data-settings-trigger>⚙️</button>
            </div>
        </header>

        <main class="level-content">
            <div class="level-title-box">
                <h2 data-i18n="shoot">SHOOT!</h2>
            </div>

            <div class="level-grid" id="levelGrid">
                <button class="lvl-btn" type="button">1</button>
                <button class="lvl-btn" type="button">2</button>
                <button class="lvl-btn" type="button">3</button>
                <button class="lvl-btn" type="button">4</button>
                <button class="lvl-btn" type="button">5</button>
                <button class="lvl-btn" type="button">6</button>
                <button class="lvl-btn" type="button">7</button>
                <button class="lvl-btn" type="button">8</button>
                <button class="lvl-btn" type="button">9</button>
                <button class="lvl-btn" type="button">10</button>
                <button class="lvl-btn" type="button">11</button>
                <button class="lvl-btn" type="button">12</button>
                <button class="lvl-btn" type="button">13</button>
                <button class="lvl-btn" type="button">14</button>
                <button class="lvl-btn" type="button">15</button>
                <button class="lvl-btn" type="button">16</button>
                <button class="lvl-btn" type="button">17</button>
                <button class="lvl-btn" type="button">18</button>
                <button class="lvl-btn" type="button">19</button>
                <button class="lvl-btn" type="button">20</button>
            </div>
        </main>

        <footer class="footer-nav">
            <button class="back-btn" type="button" onclick="location.href='mode.html'" data-i18n="back">Back</button>
        </footer>
    </div>

</body>
</html>
