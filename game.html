<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitman Master - Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="shared.css">
    <script src="app.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body data-page="game">

    <div class="game-shell">
        <header class="game-topbar">
            <button class="back-btn" type="button" id="backToLevels" data-i18n="back">Back</button>

            <div class="game-title-block">
                <h1>Hitman Master</h1>
                <p id="missionText">Normal / Level 1</p>
            </div>

            <div class="game-controls">
                <button class="back-btn compact-btn" type="button" id="pauseBtn" data-i18n="pause">Pause</button>
                <button class="hidden-settings" type="button" title="Settings" data-settings-trigger>⚙️</button>
            </div>
        </header>

        <section class="game-hud" aria-label="Mission status">
            <div class="hud-pill">Score <span id="scoreValue">0</span></div>
            <div class="hud-pill">Ammo <span id="ammoValue">00/00</span></div>
            <div class="hud-pill">Time <span id="timerValue">0</span>s</div>
            <div class="hud-pill">Hits <span id="hitValue">0</span>/<span id="requiredValue">0</span></div>
            <div class="hud-pill">Combo <span id="comboValue">0</span>x</div>
        </section>

        <main class="scope-arena" id="arena" aria-label="Shooting range">
            <img class="arena-bg" id="arenaBg" src="Easymode1.png" alt="Mission background">
            <div class="scope-guide scope-guide-v" aria-hidden="true"></div>
            <div class="scope-guide scope-guide-h" aria-hidden="true"></div>
            <div id="targetLayer" class="target-layer" aria-hidden="true"></div>
            <div id="shotLayer" class="shot-layer" aria-hidden="true"></div>
            <div id="crosshair" class="crosshair" aria-hidden="true"></div>
            <div id="countdown" class="countdown" aria-live="polite">3</div>
        </main>

        <footer class="game-footer">
            <button class="back-btn" type="button" id="reloadBtn" data-i18n="reload">Reload</button>
            <div class="mission-bar" aria-label="Mission progress">
                <span class="mission-fill" id="missionFill"></span>
                <strong id="missionProgress">0%</strong>
            </div>
            <button class="back-btn" type="button" id="restartBtn" data-i18n="restart">Restart</button>
        </footer>
    </div>

    <section class="result-panel" id="resultPanel" hidden>
        <div class="result-card">
            <h2 id="resultTitle">Mission Complete!</h2>
            <p id="resultStats">Score: 0</p>
            <div class="result-actions">
                <button class="back-btn" type="button" id="retryBtn" data-i18n="retry">Retry</button>
                <button class="back-btn" type="button" id="levelsBtn" data-i18n="levels">Levels</button>
                <button class="back-btn" type="button" id="nextLevelBtn" data-i18n="nextLevel">Next Level</button>
            </div>
        </div>
    </section>

</body>
</html>
